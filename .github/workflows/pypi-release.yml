name: PyPI Release

on:
  push:
    tags:
      # Match your 4-part version tags, e.g. v0.9.10.0
      - "v*.*.*.*"
  workflow_dispatch:

jobs:
  build-and-publish:
    name: Build, Test, And Publish To PyPI
    runs-on: ubuntu-latest

    # Required for PyPI Trusted Publishing (OIDC)
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Needed so we can check branch containment

      - name: Ensure Tag Is On Stable Branch
        run: |
          git fetch origin stable
          if ! git branch --contains "$GITHUB_SHA" origin/stable; then
            echo "::error::Tag ${GITHUB_REF} is NOT based on origin/stable. Aborting PyPI release."
            echo "Commit: $GITHUB_SHA"
            exit 1
          fi
          echo "Tag ${GITHUB_REF} is based on origin/stable. Proceeding with release."

      - name: Set Up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Upgrade pip
        run: |
          python -m pip install --upgrade pip

      - name: Install Project (With Dev Extras)
        run: |
          python -m pip install ".[dev]"

      - name: Run Test Suite
        run: |
          pytest

      - name: Install Build Tools
        run: |
          python -m pip install build

      - name: Build sdist And Wheel
        run: |
          python -m build

      - name: Publish To PyPI (Trusted Publisher)
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          repository-url: https://upload.pypi.org/legacy/
          verbose: true
